apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: python-devsecops-hpa
  namespace: python-devsecops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: python-devsecops

  minReplicas: 2
  maxReplicas: 5
  metrics:

  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70